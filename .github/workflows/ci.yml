name: Backend CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install lint dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pylint

      - name: Ruff lint check
        run: ruff check . --output-format=github

      - name: Pylint backend modules
        run: |
          pylint \
            --rcfile=.pylintrc \
            main.py \
            database.py \
            models.py \
            schemas.py \
            routers \
            services

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run tests with coverage
        env:
          DATABASE_URL: sqlite:///./ci_test.db
          ENVIRONMENT: test
          SECRET_KEY: ci-test-secret-key-not-for-production
        run: |
          python -m pytest \
            --cov=. \
            --cov-branch \
            --cov-report=term-missing:skip-covered \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=80 \
            -v \
            --tb=short

      - name: Upload coverage report
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 14

  migration-check:
    name: Migration integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify all migrations are importable and have upgrade/downgrade
        run: |
          python - <<'EOF'
          import importlib.util, pathlib, sys
          versions = pathlib.Path("alembic/versions")
          errors = []
          for f in sorted(versions.glob("*.py")):
              spec = importlib.util.spec_from_file_location(f.stem, f)
              mod  = importlib.util.module_from_spec(spec)
              try:
                  spec.loader.exec_module(mod)
                  assert hasattr(mod, "upgrade") and hasattr(mod, "downgrade"), \
                      f"{f.name} missing upgrade/downgrade"
              except Exception as e:
                  errors.append(f"{f.name}: {e}")
          if errors:
              print("\n".join(errors)); sys.exit(1)
          print(f"All {len(list(versions.glob('*.py')))} migrations OK")
          EOF
